<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <title>mcpe demo</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">
    <canvas id="game"></canvas>

    <div id="titleScreen" class="overlay">
      <img id="logo" src="assets/logo.png" alt="Minecraft Pocket Edition logo" />
      <div class="title-panel">
        <h1>0.1.01 alpha</h1>
        <p>Creative mode • tablet controls • 3D</p>
        <button id="startBtn" type="button">Start</button>
      </div>
    </div>

    <div id="hud" class="hidden">
      <div id="topBar">
        <div id="hotbarWrap">
          <div id="hotbar"></div>
          <button id="inventoryBtn" type="button">Inventory</button>
        </div>
      </div>

      <div id="crosshair">+</div>
      <div id="message"></div>

      <div id="leftControls">
        <button class="ctrl move" data-act="forward" type="button">▲</button>
        <div class="middleRow">
          <button class="ctrl move" data-act="left" type="button">◀</button>
          <button class="ctrl move" data-act="back" type="button">▼</button>
          <button class="ctrl move" data-act="right" type="button">▶</button>
        </div>
      </div>

      <div id="rightControls">
        <button class="ctrl action" id="jumpBtn" type="button">Jump</button>
        <button class="ctrl action" id="breakBtn" type="button">Break</button>
        <button class="ctrl action primary" id="placeBtn" type="button">Place</button>
        <button class="ctrl action reactor" id="activateBtn" type="button">Activate</button>
      </div>

      <div id="lookPad">
        <div class="lookLabel">LOOK</div>
      </div>
    </div>

    <div id="inventoryOverlay" class="hidden">
      <div id="inventoryPanel">
        <div class="inventoryHeader">
          <h2>Inventory</h2>
          <button id="closeInventoryBtn" type="button">Done</button>
        </div>
        <div id="inventoryGrid"></div>
      </div>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
